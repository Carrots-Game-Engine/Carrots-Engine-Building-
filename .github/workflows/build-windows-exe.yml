name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: './Carrots-Engine source code/newIDE/electron-app'
      run: npm install --legacy-peer-deps
    
    - name: Build application
      working-directory: './Carrots-Engine source code/newIDE/electron-app'
      run: npm run build
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: carrots-engine-exe
        path: './Carrots-Engine source code/newIDE/electron-app/dist/**/*.exe'
        retention-days: 30
    
    - name: Create Release (على Tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: './Carrots-Engine source code/newIDE/electron-app/dist/**/*.exe'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
